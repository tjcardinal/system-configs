services:
  tailscale:
    image: tailscale/tailscale:latest
    restart: unless-stopped
    volumes:
      - tailscale:/var/lib/tailscale
      - /dev/net/tun:/dev/net/tun
    network_mode: host
    cap_add:
      - net_admin
      - net_raw
    environment:
      - TS_DEBUG_FIREWALL_MODE=nftables
      - TS_ROUTES=192.168.1.0/24
      - TS_USERSPACE=false
    env_file:
      - .env # TS_AUTHKEY

volumes:
  tailscale:
